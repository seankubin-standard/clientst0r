{% if show_org_selector_warning %}
<div class="alert alert-info border-start border-info border-4 mb-4" role="alert">
    <div class="d-flex align-items-start">
        <div class="flex-shrink-0 me-3">
            <i class="fas fa-building fa-2x text-info"></i>
        </div>
        <div class="flex-grow-1">
            <h5 class="alert-heading mb-2">
                <i class="fas fa-info-circle"></i> Organization Selection Required
            </h5>
            <p class="mb-3">
                You are currently in <strong>Global View</strong>. This resource must be assigned to an organization.
                Please select an organization below to continue.
            </p>
            <div class="row">
                <div class="col-md-6">
                    <label for="orgSelector" class="form-label fw-bold">Select Organization:</label>
                    <select id="orgSelector" class="form-select" name="_selected_organization_id" required>
                        <option value="">-- Select an organization --</option>
                        {% for org in available_organizations %}
                        <option value="{{ org.id }}">{{ org.name }}</option>
                        {% endfor %}
                    </select>
                    <div class="form-text mt-2">
                        <i class="fas fa-info-circle"></i> Selecting an organization will switch your current context.
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// v3.17.316: rewritten as vanilla JS — drops the jQuery / Select2
// dependency that previously crashed the script when those globals
// weren't loaded, leaving the hidden `_selected_organization_id`
// field uninjected and POSTs failing with "Please select an
// organization before creating this resource" even after a pick.
(function() {
    function init() {
        var orgSelector = document.getElementById('orgSelector');
        var mainForm = document.querySelector('form[method="post"]');
        if (!orgSelector || !mainForm) {
            return;
        }

        // Inject the hidden input now so it exists before any
        // submit attempt; we update its value on every change.
        var hidden = mainForm.querySelector(
            'input[name="_selected_organization_id"][data-from="org-selector"]'
        );
        if (!hidden) {
            hidden = document.createElement('input');
            hidden.type = 'hidden';
            hidden.name = '_selected_organization_id';
            hidden.setAttribute('data-from', 'org-selector');
            mainForm.appendChild(hidden);
        }

        function syncHidden() {
            hidden.value = orgSelector.value || '';
            orgSelector.classList.remove('is-invalid');
        }
        // Initial sync (handles the case where the browser auto-restored
        // a selection from a back/forward navigation).
        syncHidden();

        orgSelector.addEventListener('change', syncHidden);

        // Validate on submit — block when no org is picked.
        mainForm.addEventListener('submit', function(e) {
            if (!orgSelector.value) {
                e.preventDefault();
                orgSelector.focus();
                orgSelector.classList.add('is-invalid');
                var feedback = orgSelector.parentNode.querySelector(
                    '.org-selector-feedback'
                );
                if (!feedback) {
                    feedback = document.createElement('div');
                    feedback.className = 'invalid-feedback d-block org-selector-feedback';
                    feedback.textContent = 'Please select an organization';
                    orgSelector.parentNode.appendChild(feedback);
                }
                return false;
            }
        });
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
})();
</script>
{% endif %}
