{# Reusable widget: link the current ticket to a problem.
   Caller should pass `form_id` (unique per page) and `pk_input_id`.
   Requires `ticket` in context (ticket.ticket_number). #}
<form method="post" action="" id="{{ form_id }}">
    {% csrf_token %}
    <input type="hidden" name="ticket_number" value="{{ ticket.ticket_number }}">
    <input type="hidden" name="redirect_to" value="ticket">
    <p class="small text-muted mb-2">Enter the Problem PK to link this ticket as a recurring incident.</p>
    <div class="d-flex gap-2 align-items-center">
        <input type="number" min="1" name="problem_pk" id="{{ pk_input_id }}" class="form-control form-control-sm" placeholder="Problem PK (e.g. 42)" required>
        <button type="button" class="btn btn-sm btn-primary"
                onclick="(function(){var f=document.getElementById('{{ form_id }}');var pk=document.getElementById('{{ pk_input_id }}').value;if(!pk)return;f.action='/psa/problems/'+pk+'/link-ticket/';f.submit();})()">
            Link
        </button>
    </div>
</form>
