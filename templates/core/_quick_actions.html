<style>
.quick-actions-card .qa-subtitle {
    font-size: 0.72rem;
    color: var(--bs-secondary-color, #6c757d);
}
.quick-action-tile {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    text-decoration: none;
    padding: 14px 8px;
    border-radius: 9px;
    border: 1px solid var(--bs-border-color, rgba(0, 0, 0, 0.125));
    background-color: var(--surface, var(--bs-body-bg, #fff));
    color: var(--bs-body-color, #212529);
    transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease, background-color 0.15s ease;
    height: 100%;
    min-height: 76px;
}
.quick-action-tile:hover,
.quick-action-tile:focus {
    transform: translateY(-2px);
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.12);
    border-color: var(--primary-color, var(--bs-primary, #0d6efd));
    color: var(--primary-color, var(--bs-primary, #0d6efd));
    text-decoration: none;
}
.quick-action-tile .qa-icon {
    font-size: 24px;
    line-height: 1;
    margin-bottom: 6px;
    color: var(--primary-color, var(--bs-primary, #0d6efd));
}
.quick-action-tile .qa-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.01em;
}
[data-bs-theme="dark"] .quick-action-tile {
    border-color: rgba(255, 255, 255, 0.12);
    background-color: var(--surface, #2b3035);
    color: #dee2e6;
}
[data-bs-theme="dark"] .quick-action-tile:hover,
[data-bs-theme="dark"] .quick-action-tile:focus {
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
    border-color: var(--primary-color, var(--bs-primary, #0d6efd));
}
</style>

<div class="card mb-3 quick-actions-card">
    <div class="card-header py-2 d-flex justify-content-between align-items-center">
        <div>
            <h6 class="mb-0"><i class="fas fa-bolt"></i> Quick Actions</h6>
            <span class="qa-subtitle">Most-used MSP shortcuts</span>
        </div>
        <a href="{% url 'accounts:quick_actions_edit' %}" class="btn btn-sm btn-outline-secondary"
           data-bs-toggle="tooltip" data-bs-placement="left"
           title="Customize which quick actions appear here and in what order">
            <i class="fas fa-cog"></i> <span class="d-none d-md-inline">Customize</span>
        </a>
    </div>
    <div class="card-body py-2">
        {% if resolved_quick_actions %}
        <div class="row row-cols-3 row-cols-md-5 row-cols-lg-8 g-2">
            {% for a in resolved_quick_actions %}
            <div class="col">
                <a href="{{ a.url }}" class="quick-action-tile"
                   data-bs-toggle="tooltip" data-bs-placement="top" title="{{ a.tooltip }}">
                    <i class="fas {{ a.icon }} qa-icon"></i>
                    <span class="qa-label">{{ a.label }}</span>
                </a>
            </div>
            {% endfor %}
        </div>
        {% else %}
        <p class="text-muted small mb-0">
            No quick actions configured. <a href="{% url 'accounts:quick_actions_edit' %}">Pick some →</a>
        </p>
        {% endif %}
    </div>
</div>
