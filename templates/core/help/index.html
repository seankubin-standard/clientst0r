{% extends "base.html" %}

{% block title %}Help & Documentation{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1><i class="fas fa-book-open"></i> Help &amp; Documentation</h1>
</div>

<!-- Search bar -->
<form action="{% url 'core:help_search' %}" method="get" class="mb-4">
    <div class="input-group input-group-lg">
        <span class="input-group-text"><i class="fas fa-search"></i></span>
        <input type="search" name="q" class="form-control" placeholder="Search documentation…" autocomplete="off" autofocus>
        <button class="btn btn-primary" type="submit">Search</button>
    </div>
</form>

<!-- Section cards -->
<div class="row row-cols-1 row-cols-md-2 row-cols-xl-3 g-4">
    {% for s in sections %}
    <div class="col">
        <a href="{% url s.url_name %}" class="text-decoration-none">
            <div class="card h-100 help-index-card">
                <div class="card-body">
                    <h5 class="card-title"><i class="fas {{ s.icon }} me-2 text-primary"></i>{{ s.title }}</h5>
                    <p class="card-text text-muted">{{ s.desc }}</p>
                </div>
                <div class="card-footer bg-transparent border-top-0">
                    <small class="text-primary">Read more <i class="fas fa-arrow-right ms-1"></i></small>
                </div>
            </div>
        </a>
    </div>
    {% endfor %}
</div>

<style>
.help-index-card { transition: transform .15s, box-shadow .15s; cursor: pointer; }
.help-index-card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,.2); }
</style>
{% endblock %}
