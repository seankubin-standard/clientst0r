<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="320" viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg">
  <!-- Generic Service Van - Side View -->
  <style>
    [data-area] { cursor: pointer; transition: opacity 0.15s; }
    [data-area]:hover { opacity: 0.75; }
  </style>

  <!-- Shadow -->
  <ellipse cx="400" cy="290" rx="330" ry="12" fill="#00000022"/>

  <!-- ── Van body outline ── -->
  <!-- Underbody / floor rail -->
  <rect x="60" y="240" width="680" height="18" rx="4" fill="#4a5568"/>

  <!-- Rear bumper -->
  <rect data-area="Rear Bumper" x="710" y="215" width="50" height="45" rx="4" fill="#4a5568" stroke="#2d3748" stroke-width="2"/>

  <!-- Front bumper -->
  <rect data-area="Front Bumper" x="40" y="215" width="55" height="45" rx="4" fill="#4a5568" stroke="#2d3748" stroke-width="2"/>

  <!-- Cargo / body sides -->
  <!-- Rear cargo panel (between sliding door and rear) -->
  <rect data-area="Rear Quarter Panel" x="590" y="95" width="125" height="145" rx="2" fill="#718096" stroke="#2d3748" stroke-width="2"/>

  <!-- Sliding cargo door -->
  <rect data-area="Cargo/Sliding Door" x="420" y="95" width="165" height="145" rx="2" fill="#a0aec0" stroke="#2d3748" stroke-width="2.5"/>
  <!-- Sliding door handle -->
  <rect x="500" y="163" width="30" height="6" rx="3" fill="#2d3748"/>
  <!-- Sliding door track line -->
  <line x1="420" y1="128" x2="585" y2="128" stroke="#2d3748" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- Driver door -->
  <rect data-area="Driver Door" x="250" y="95" width="165" height="145" rx="2" fill="#a0aec0" stroke="#2d3748" stroke-width="2.5"/>
  <!-- Driver door handle -->
  <rect x="265" y="163" width="28" height="6" rx="3" fill="#2d3748"/>
  <!-- Window in driver door -->
  <rect data-area="Driver Window" x="262" y="105" width="145" height="58" rx="4" fill="#90cdf4" stroke="#2d3748" stroke-width="1.5" opacity="0.75"/>

  <!-- A-pillar / cab front panel -->
  <polygon data-area="Front Cab" points="95,240 95,130 175,90 250,90 250,240" fill="#718096" stroke="#2d3748" stroke-width="2"/>

  <!-- Windshield -->
  <polygon data-area="Windshield" points="100,220 100,135 175,92 248,92 248,220" fill="#90cdf4" stroke="#2d3748" stroke-width="1.5" opacity="0.75"/>

  <!-- Roof -->
  <rect data-area="Roof" x="175" y="72" width="545" height="24" rx="4" fill="#718096" stroke="#2d3748" stroke-width="2"/>

  <!-- Hood (short on a van) -->
  <rect data-area="Hood" x="55" y="130" width="45" height="110" rx="2" fill="#8898aa" stroke="#2d3748" stroke-width="2"/>

  <!-- Rear doors (double) -->
  <rect data-area="Rear Doors" x="715" y="92" width="42" height="150" rx="3" fill="#a0aec0" stroke="#2d3748" stroke-width="2"/>
  <!-- Door split line -->
  <line x1="736" y1="92" x2="736" y2="242" stroke="#2d3748" stroke-width="1.5" stroke-dasharray="3,2"/>
  <!-- Rear door handle -->
  <circle cx="722" cy="168" r="4" fill="#2d3748"/>
  <circle cx="750" cy="168" r="4" fill="#2d3748"/>

  <!-- Rooftop ridge / marker lights -->
  <rect data-area="Roof Rack / Top" x="180" y="62" width="535" height="12" rx="3" fill="#5a6778" stroke="#2d3748" stroke-width="1"/>

  <!-- Headlights -->
  <rect data-area="Headlight" x="46" y="145" width="18" height="28" rx="4" fill="#fbbf24" stroke="#2d3748" stroke-width="1"/>
  <rect data-area="Daytime Running Light" x="46" y="175" width="18" height="10" rx="2" fill="#fde68a" stroke="#2d3748" stroke-width="1"/>

  <!-- Taillights -->
  <rect data-area="Taillight" x="736" y="145" width="18" height="30" rx="4" fill="#ef4444" stroke="#2d3748" stroke-width="1"/>
  <rect data-area="Reverse Light" x="736" y="177" width="18" height="12" rx="2" fill="#e2e8f0" stroke="#2d3748" stroke-width="1"/>

  <!-- Driver side mirror -->
  <rect data-area="Driver Side Mirror" x="96" y="108" width="22" height="14" rx="3" fill="#4a5568" stroke="#2d3748" stroke-width="1"/>
  <line x1="96" y1="115" x2="82" y2="118" stroke="#2d3748" stroke-width="2"/>

  <!-- Front wheel arch cutout + wheel -->
  <ellipse cx="165" cy="262" rx="42" ry="22" fill="#1a202c"/>
  <circle data-area="Front Wheel" cx="165" cy="262" r="38" fill="#1a202c" stroke="#718096" stroke-width="4"/>
  <circle cx="165" cy="262" r="20" fill="#4a5568"/>
  <circle cx="165" cy="262" r="8" fill="#718096"/>
  <!-- Wheel arch -->
  <path d="M 123 258 Q 125 222 165 220 Q 205 222 207 258" fill="#2d3748" stroke="#2d3748" stroke-width="1"/>

  <!-- Rear wheel arch cutout + wheel -->
  <ellipse cx="630" cy="262" rx="42" ry="22" fill="#1a202c"/>
  <circle data-area="Rear Wheel" cx="630" cy="262" r="38" fill="#1a202c" stroke="#718096" stroke-width="4"/>
  <circle cx="630" cy="262" r="20" fill="#4a5568"/>
  <circle cx="630" cy="262" r="8" fill="#718096"/>
  <!-- Wheel arch -->
  <path d="M 588 258 Q 590 222 630 220 Q 670 222 672 258" fill="#2d3748" stroke="#2d3748" stroke-width="1"/>

  <!-- Fuel cap -->
  <circle data-area="Fuel Cap" cx="680" cy="175" r="7" fill="#4a5568" stroke="#2d3748" stroke-width="1.5"/>

  <!-- ── Labels ── -->
  <g font-family="Arial,sans-serif" font-size="11" fill="#1a202c" opacity="0.7" text-anchor="middle">
    <text x="68" y="88">Front</text>
    <text x="335" y="88">Driver Door</text>
    <text x="502" y="88">Cargo Door</text>
    <text x="652" y="88">Rear Quarter</text>
    <text x="736" y="88">Rear</text>
    <text x="165" y="310">Front Wheel</text>
    <text x="630" y="310">Rear Wheel</text>
  </g>
</svg>
