# Client St0r — nginx reverse-proxy site config.
#
# Loaded by the optional `nginx` service in docker-compose.yml
# (`docker compose --profile proxy up -d`).
#
# Before enabling TLS:
#   1. Drop `cert.pem` + `key.pem` into ./docker/nginx/ssl/
#      (or point certbot's deploy hook at the same directory).
#   2. Set server_name to your real hostname.
#   3. Uncomment the HTTPS server block at the bottom and the
#      `return 301` redirect in the HTTP block above.

upstream clientst0r {
    server app:8000;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Once HTTPS is configured, uncomment this line to force redirect.
    # return 301 https://$host$request_uri;

    location /health/ {
        proxy_pass http://clientst0r;
        proxy_set_header Host $host;
        access_log off;
    }

    location /static/ {
        alias /app/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        proxy_pass http://clientst0r;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 60s;
        # 300s to match gunicorn --timeout: long-running AI documentation
        # generation (Ollama on CPU can take minutes) must not be cut off by
        # the proxy before gunicorn responds. See #138.
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
}

