upstream clientst0r_app {
    server unix:/home/administrator/gunicorn.sock fail_timeout=0;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 250M;  # Increased for large imports (Bitwarden, etc.)

    access_log /var/log/nginx/clientst0r-access.log;
    error_log /var/log/nginx/clientst0r-error.log;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Static files
    location /static/ {
        alias /home/administrator/static_collected/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Private file serving via X-Accel-Redirect
    # This location is internal only, accessed via Django views
    location /internal_uploads/ {
        internal;
        alias /var/lib/itdocs/uploads/;
    }

    # Django application
    location / {
        proxy_pass http://clientst0r_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_buffering off;

        # Timeouts
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}

