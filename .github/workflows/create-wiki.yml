name: Initialize Wiki
on:
  workflow_dispatch:

jobs:
  init-wiki:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create initial wiki page
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # The wiki repo URL using the built-in GITHUB_TOKEN
          WIKI_REPO="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git"
          
          # Clone or init
          if git clone "$WIKI_REPO" wiki-temp 2>/dev/null; then
            echo "Wiki already initialized"
            rm -rf wiki-temp
          else
            echo "Initializing wiki..."
            mkdir wiki-temp
            cd wiki-temp
            git init
            echo "# ClientSt0r" > Home.md
            git add Home.md
            git commit -m "Initialize wiki"
            git remote add origin "$WIKI_REPO"
            git push -u origin master || git push -u origin main
            echo "Wiki initialized!"
          fi
